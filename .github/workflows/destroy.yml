name: Destroy Infrastructure
on:
  workflow_dispatch: # Permite ejecutar la destruccion manualmente desde GitHub Actions

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Eliminar CloudFormation Stack
        run: |
          aws cloudformation delete-stack --stack-name ExamenFinalStack
          aws cloudformation wait stack-delete-complete --stack-name ExamenFinalStack